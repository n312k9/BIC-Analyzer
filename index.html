<!DOCTYPE html>
<html>
<head>
  <title>Gemini via Cloudflare</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; }
    textarea { width: 100%; height: 80px; }
    button { padding: 10px; margin-top: 10px; }
    #response { margin-top: 20px; background: #f4f4f4; padding: 10px; }
  </style>
</head>
<body>

  <h2>Gemini Test (Secure via Cloudflare)</h2>

  <textarea id="prompt" placeholder="Enter prompt..."></textarea>
  <br>
  <button onclick="askGemini()">Ask Gemini</button>

  <div id="response"></div>

  <script>
    async function askGemini() {

      const workerURL = "https://throbbing-firefly-2e6e.nkandwal89.workers.dev";

      const prompt = document.getElementById("prompt").value;
      const responseDiv = document.getElementById("response");

      responseDiv.innerHTML = "Loading...";

      try {
        const res = await fetch(workerURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.candidates) {
          responseDiv.innerHTML =
            data.candidates[0].content.parts[0].text;
        } else {
          responseDiv.innerHTML =
            "Error: " + JSON.stringify(data);
        }

      } catch (err) {
        responseDiv.innerHTML = "Fetch Error: " + err.message;
      }
    }
  </script>

</body>
</html>
