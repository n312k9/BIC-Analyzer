<!DOCTYPE html>
<html>
<head>
  <title>Gemini via Cloudflare</title>
  <style>
    body { 
      font-family: Arial; 
      max-width: 700px; 
      margin: 50px auto; 
    }
    textarea { 
      width: 100%; 
      height: 100px; 
      padding: 10px;
    }
    button { 
      padding: 10px 20px; 
      margin-top: 10px; 
      cursor: pointer;
    }
    #response { 
      margin-top: 20px; 
      background: #f4f4f4; 
      padding: 15px; 
      border-radius: 6px;
      min-height: 60px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Gemini Test (Cloudflare Proxy)</h2>

  <textarea id="prompt" placeholder="Enter your prompt..."></textarea>
  <br>
  <button onclick="askGemini()">Ask Gemini</button>

  <div id="response"></div>

  <script>
    async function askGemini() {

      const workerURL = "https://throbbing-firefly-2e6e.nkandwal89.YOUR_SUBDOMAIN.workers.dev";

      const prompt = document.getElementById("prompt").value;
      const responseDiv = document.getElementById("response");

      responseDiv.innerHTML = "⏳ Loading...";

      try {
        const res = await fetch(workerURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.candidates) {
          responseDiv.innerHTML =
            data.candidates[0].content.parts[0].text;
        } else {
          responseDiv.innerHTML =
            "Error:\n" + JSON.stringify(data, null, 2);
        }

      } catch (error) {
        responseDiv.innerHTML =
          "Fetch Error: " + error.message;
      }
    }
  </script>

</body>
</html>
